services:
  api:
    build: .
    environment:
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      # Google AI (Gemini)
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      # GCP / Vertex AI
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_LOCATION: ${GCP_LOCATION}
      # Firebase
      FIREBASE_CREDENTIALS_FILE: /app/credentials/serviceAccount.json
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET}
      # CloudConvert
      CLOUDCONVERT_API_KEY: ${CLOUDCONVERT_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./serviceAccount.json:/app/credentials/serviceAccount.json:ro

  ngrok:
    image: ngrok/ngrok:latest
    depends_on:
      - api
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command:
      - http
      - --url=learning-partially-rabbit.ngrok-free.app
      - api:8000
