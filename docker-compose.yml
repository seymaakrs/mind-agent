services:
  api:
    build: .
    environment:
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      # Google AI (Gemini)
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      # GCP / Vertex AI
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_LOCATION: ${GCP_LOCATION}
      # Firebase
      FIREBASE_CREDENTIALS_FILE: /app/credentials/serviceAccount.json
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET}
      # Zernio (posting + WhatsApp + Inbox)
      ZERNIO_API_KEY: ${ZERNIO_API_KEY}
      ZERNIO_BASE_URL: ${ZERNIO_BASE_URL:-https://api.zernio.com/v1}
      ZERNIO_WA_ACCOUNT_ID: ${ZERNIO_WA_ACCOUNT_ID}
      ZERNIO_WEBHOOK_SECRET: ${ZERNIO_WEBHOOK_SECRET}
      # fal.ai (MMAudio - video audio generation)
      FAL_KEY: ${FAL_KEY}
      # Serper.dev (Google SERP API)
      SERPER_API_KEY: ${SERPER_API_KEY}
      # Dry-run mode
      DRY_RUN: ${DRY_RUN:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./serviceAccount.json:/app/credentials/serviceAccount.json:ro
