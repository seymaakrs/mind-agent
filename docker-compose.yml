services:
  api:
    build: .
    environment:
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      # Google AI (Gemini)
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      # GCP / Vertex AI
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_LOCATION: ${GCP_LOCATION}
      # Firebase
      FIREBASE_CREDENTIALS_FILE: /app/credentials/serviceAccount.json
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET}
      # CloudConvert
      CLOUDCONVERT_API_KEY: ${CLOUDCONVERT_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./serviceAccount.json:/app/credentials/serviceAccount.json:ro

  # Cloudflare Tunnel - Quick Tunnel (trycloudflare.com subdomain)
  cloudflared:
    image: cloudflare/cloudflared:latest
    depends_on:
      - api
    command:
      - tunnel
      - --no-autoupdate
      - --protocol
      - http2
      - --url
      - http://api:8000

  # Tunnel URL Watcher - URL degisince Firebase'i otomatik gunceller
  tunnel-watcher:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - cloudflared
    environment:
      FIREBASE_CREDENTIALS_FILE: /app/credentials/serviceAccount.json
    volumes:
      - ./serviceAccount.json:/app/credentials/serviceAccount.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["python", "scripts/tunnel_watcher.py"]
    restart: unless-stopped
